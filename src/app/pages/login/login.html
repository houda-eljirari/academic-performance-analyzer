<div class="login-page">
  <div class="login-card">
    <div class="login-card__header">
      <span class="login-card__icon">🎓</span>
      <h1>AcademiX</h1>
      <p>Sign in to your academic portal</p>
    </div>
    <div class="login-card__form">

      @if (error) {
        <div class="form-error">{{ error }}</div>
      }

      <div class="form-group">
        <label>Email</label>
        <input type="email" [(ngModel)]="email" placeholder="you@university.edu" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" [(ngModel)]="password" placeholder="••••••••" (keyup.enter)="onSubmit()" />
      </div>
      <button class="login-btn" (click)="onSubmit()" [disabled]="loading">
        @if (!loading) {
          <span>Sign In</span>
        } @else {
          <span>Signing in...</span>
        }
      </button>

    </div>
  </div>
</div>
